<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空風景 ― 12か月の星空ギャラリー</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<style>
:root{
  --night:#070d1f;        /* 最も深い藍 */
  --night-2:#0d1733;      /* 夜空の藍 */
  --night-3:#152244;      /* やや明るい藍 */
  --haze:#243556;         /* 地平の靄 */
  --star:#f4f7ff;         /* 星の白 */
  --silver:#aebdde;       /* 銀河の淡い光 */
  --muted:#6f80a6;        /* 控えめな文字 */
  --gold:#e8d6a0;         /* 流れ星・アクセント */
  --gold-soft:#c9b87f;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, var(--night-3) 0%, var(--night-2) 38%, var(--night) 100%);
  color:var(--star);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ───── 背景の星 ───── */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-star{position:absolute;border-radius:50%;background:var(--star);animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.15}to{opacity:1}}

/* ───── 共通レイアウト ───── */
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px}

/* ───── ヘッダー ───── */
header{text-align:center;padding:88px 24px 40px}
header .eyebrow{
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  letter-spacing:.55em;font-size:.7rem;color:var(--gold-soft);
  text-transform:uppercase;margin-bottom:22px;padding-left:.55em;
}
header h1{
  font-size:clamp(2.1rem,6vw,3.6rem);font-weight:600;
  letter-spacing:.12em;line-height:1.3;
  background:linear-gradient(180deg,var(--star),var(--silver));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
header h1 .small{display:block;font-size:.42em;letter-spacing:.3em;color:var(--silver);margin-top:18px;-webkit-text-fill-color:var(--silver)}
header p.lead{margin-top:26px;color:var(--muted);font-size:.95rem;letter-spacing:.08em}

/* ───── スライドショー起動ボタン ───── */
.btn-slideshow{
  display:inline-flex;align-items:center;gap:.6em;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  font-size:.85rem;letter-spacing:.2em;
  color:var(--night);background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  border:none;border-radius:999px;padding:14px 30px;cursor:pointer;
  transition:transform .3s,box-shadow .3s;
  box-shadow:0 0 0 0 rgba(232,214,160,.5);
}
.btn-slideshow:hover{transform:translateY(-2px);box-shadow:0 8px 30px -6px rgba(232,214,160,.5)}
.btn-slideshow .ico{font-size:1.05em}
.btn-row{text-align:center;margin-top:34px}

/* ───── 月タブ ───── */
.tabs{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  margin:56px 0 12px;
}
.tab{
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  font-size:.82rem;letter-spacing:.14em;
  color:var(--silver);background:rgba(255,255,255,.04);
  border:1px solid rgba(174,189,222,.15);border-radius:999px;
  padding:9px 17px;cursor:pointer;transition:all .25s;
}
.tab .num{display:block;font-size:.62rem;color:var(--muted);letter-spacing:.05em;margin-top:2px}
.tab:hover{border-color:var(--gold-soft);color:var(--star)}
.tab.active{background:linear-gradient(135deg,rgba(232,214,160,.22),rgba(201,184,127,.1));border-color:var(--gold);color:var(--star)}
.tab.active .num{color:var(--gold-soft)}

.month-title{
  text-align:center;margin:46px 0 8px;
  font-size:1.5rem;letter-spacing:.3em;color:var(--star);font-weight:500;
}
.month-title .sub{display:block;font-family:"Hiragino Sans",sans-serif;font-size:.7rem;letter-spacing:.2em;color:var(--muted);margin-top:8px}

/* ───── ギャラリー グリッド ───── */
#status{text-align:center;color:var(--muted);padding:50px 0;letter-spacing:.1em;font-size:.9rem}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:18px;margin:30px 0 10px;min-height:120px;
}
.card{
  position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
  aspect-ratio:3/2;background:var(--night-3);
  box-shadow:0 4px 20px -10px rgba(0,0,0,.8);
  transition:transform .4s,box-shadow .4s;
}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .8s,filter .4s;filter:saturate(.9)}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 36px -14px rgba(0,0,0,.9)}
.card:hover img{transform:scale(1.06);filter:saturate(1.05)}
.card .cap{
  position:absolute;left:0;right:0;bottom:0;
  padding:26px 14px 12px;font-size:.82rem;letter-spacing:.06em;
  background:linear-gradient(transparent,rgba(7,13,31,.92));
}
.card .cap small{display:block;color:var(--gold-soft);font-size:.66rem;letter-spacing:.18em;margin-bottom:3px;font-family:"Hiragino Sans",sans-serif}

/* ───── ライトボックス（拡大／めくり） ───── */
.lightbox{
  position:fixed;inset:0;z-index:60;display:none;
  background:rgba(4,8,20,.96);backdrop-filter:blur(6px);
  flex-direction:column;align-items:center;justify-content:center;
}
.lightbox.open{display:flex}
.lb-stage{position:relative;max-width:92vw;max-height:74vh;display:flex;align-items:center;justify-content:center}
.lb-stage img{max-width:92vw;max-height:74vh;border-radius:8px;box-shadow:0 20px 60px -20px #000;animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lb-cap{margin-top:18px;text-align:center}
.lb-cap .t{font-size:1.1rem;letter-spacing:.12em}
.lb-cap .m{font-family:"Hiragino Sans",sans-serif;font-size:.7rem;letter-spacing:.2em;color:var(--gold-soft);margin-bottom:6px}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);
  width:54px;height:54px;border-radius:50%;border:1px solid rgba(174,189,222,.3);
  background:rgba(13,23,51,.6);color:var(--star);font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .25s}
.lb-nav:hover{background:rgba(36,53,86,.9);border-color:var(--gold-soft)}
.lb-prev{left:-72px}.lb-next{right:-72px}
.lb-close{position:absolute;top:24px;right:28px;width:46px;height:46px;border-radius:50%;
  background:rgba(13,23,51,.6);border:1px solid rgba(174,189,222,.3);color:var(--star);
  font-size:1.3rem;cursor:pointer;z-index:2}
.lb-close:hover{border-color:var(--gold-soft)}
.lb-tools{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:22px}
.lb-btn{
  font-family:"Hiragino Sans",sans-serif;font-size:.78rem;letter-spacing:.16em;
  border:1px solid rgba(232,214,160,.4);color:var(--gold);background:transparent;
  border-radius:999px;padding:11px 22px;cursor:pointer;transition:all .25s;
}
.lb-btn:hover{background:rgba(232,214,160,.12)}
.lb-btn.solid{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:var(--night);border:none}

/* ───── 流れ星 ───── */
.shooting{position:fixed;z-index:80;pointer-events:none;width:2px;height:2px;background:var(--star);border-radius:50%;
  box-shadow:0 0 8px 2px rgba(244,247,255,.9)}
.shooting::after{content:"";position:absolute;top:50%;right:0;width:160px;height:1px;
  transform:translateY(-50%);background:linear-gradient(90deg,rgba(244,247,255,.9),transparent)}

/* ───── スライドショー全画面 ───── */
#slideshow{position:fixed;inset:0;z-index:100;display:none;background:#02040c;overflow:hidden}
#slideshow.open{display:block}
.ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s ease}
.ss-img.show{opacity:1}
#slideshow::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(2,4,12,.6) 100%)}
.ss-caption{position:absolute;left:0;right:0;bottom:48px;z-index:3;text-align:center;
  padding:0 24px;opacity:0;transition:opacity 1.2s ease}
.ss-caption.show{opacity:1}
.ss-caption .t{font-size:1.4rem;letter-spacing:.2em;text-shadow:0 2px 20px #000}
.ss-caption .m{font-family:"Hiragino Sans",sans-serif;font-size:.72rem;letter-spacing:.3em;color:var(--gold-soft);margin-bottom:8px}
.ss-close{position:absolute;top:24px;right:28px;z-index:4;width:46px;height:46px;border-radius:50%;
  background:rgba(13,23,51,.5);border:1px solid rgba(174,189,222,.3);color:var(--star);font-size:1.3rem;cursor:pointer}
.ss-close:hover{border-color:var(--gold-soft)}
.ss-hint{position:absolute;top:30px;left:28px;z-index:4;font-family:"Hiragino Sans",sans-serif;
  font-size:.66rem;letter-spacing:.22em;color:var(--muted)}

/* ───── フッター ───── */
footer{text-align:center;padding:80px 24px 60px;margin-top:60px}
footer .div{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);margin:0 auto 30px}
footer a{
  display:inline-flex;align-items:center;gap:.5em;
  font-family:"Hiragino Sans",sans-serif;letter-spacing:.18em;font-size:.9rem;
  color:var(--silver);text-decoration:none;border-bottom:1px solid transparent;transition:all .25s;padding-bottom:3px;
}
footer a:hover{color:var(--gold);border-color:var(--gold-soft)}
footer .copy{margin-top:24px;color:var(--muted);font-size:.72rem;letter-spacing:.12em}

@media(max-width:640px){
  header{padding:60px 20px 30px}
  .lb-prev{left:8px}.lb-next{right:8px}
  .lb-nav{width:46px;height:46px}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.1ms!important}
}
</style>
</head>
<body>

<div id="starfield"></div>

<header>
  <div class="eyebrow">Silent Universe</div>
  <h1>星空風景<span class="small">十二か月の星景ギャラリー</span></h1>
  <p class="lead">夜空を見上げた、その一瞬を。月ごとにめぐる星の風景。</p>
  <div class="btn-row">
    <button class="btn-slideshow" onclick="Slideshow.start('all')">
      <span class="ico">✦</span>スライドショーをはじめる
    </button>
  </div>
</header>

<div class="wrap">
  <nav class="tabs" id="tabs"></nav>

  <h2 class="month-title" id="monthTitle"></h2>
  <div class="btn-row">
    <button class="btn-slideshow" onclick="Slideshow.start('month')">
      <span class="ico">✦</span>この月のスライドショー
    </button>
  </div>

  <div id="status">星空を読み込んでいます…</div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="div"></div>
  <a href="https://lit.link/starwalker0202" target="_blank" rel="noopener">
    starwalker0202 ― すべてのリンクへ ↗
  </a>
  <div class="copy">星景写真 ／ 自然のままの星空にこだわって</div>
</footer>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="Lightbox.close()" aria-label="閉じる">✕</button>
  <div class="lb-stage">
    <button class="lb-nav lb-prev" onclick="Lightbox.move(-1)" aria-label="前へ">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" onclick="Lightbox.move(1)" aria-label="次へ">›</button>
  </div>
  <div class="lb-cap">
    <div class="m" id="lbMonth"></div>
    <div class="t" id="lbTitle"></div>
  </div>
  <div class="lb-tools">
    <button class="lb-btn" onclick="shootStar()">☄ 流れ星</button>
    <button class="lb-btn solid" onclick="Slideshow.start('from-lightbox')">✦ スライドショーをはじめる</button>
  </div>
</div>

<!-- スライドショー -->
<div id="slideshow">
  <div class="ss-hint">♪ BGM 再生中 ― 画面のどこでも操作できます</div>
  <button class="ss-close" onclick="Slideshow.stop()" aria-label="終了">✕</button>
  <img class="ss-img" id="ssA" alt="">
  <img class="ss-img" id="ssB" alt="">
  <div class="ss-caption" id="ssCap"><div class="m" id="ssCapM"></div><div class="t" id="ssCapT"></div></div>
</div>

<audio id="bgm"></audio>

<script>
/* ════════════════════════════════════════════
   設定 ― ここを書き換えれば誰でも使えます
════════════════════════════════════════════ */
const CONFIG = {
  user:  "starwalker0202",
  repo:  "star-gallery-",
  branch:"main",
  bgm:   ["01.mp3","02.mp3","03.mp3","04.mp3"],
  slideSec: 7
};
const MONTHS = [
  {n:1,wa:"睦月",en:"January"},{n:2,wa:"如月",en:"February"},
  {n:3,wa:"弥生",en:"March"},  {n:4,wa:"卯月",en:"April"},
  {n:5,wa:"皐月",en:"May"},    {n:6,wa:"水無月",en:"June"},
  {n:7,wa:"文月",en:"July"},   {n:8,wa:"葉月",en:"August"},
  {n:9,wa:"長月",en:"September"},{n:10,wa:"神無月",en:"October"},
  {n:11,wa:"霜月",en:"November"},{n:12,wa:"師走",en:"December"}
];

/* ════════════════════════════════════════════
   背景の星を散らす
════════════════════════════════════════════ */
(function(){
  const f=document.getElementById("starfield");
  for(let i=0;i<140;i++){
    const s=document.createElement("div");s.className="bg-star";
    const sz=Math.random()*2+0.5;
    s.style.width=s.style.height=sz+"px";
    s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";
    s.style.setProperty("--dur",(Math.random()*3+1.5)+"s");
    s.style.animationDelay=Math.random()*4+"s";
    f.appendChild(s);
  }
})();

/* ════════════════════════════════════════════
   データ読み込み（GitHub API）
   ファイル名「月_タイトル.jpg」を解析
════════════════════════════════════════════ */
const Gallery = {
  byMonth:{},   // {1:[{file,title,url,month}], ...}
  all:[],       // 暦順フラット配列
  current:1,    // 表示中の月

  rawUrl(file){
    return `https://raw.githubusercontent.com/${CONFIG.user}/${CONFIG.repo}/${CONFIG.branch}/${encodeURIComponent(file)}`;
  },

  async load(){
    const api=`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/?ref=${CONFIG.branch}`;
    try{
      const res=await fetch(api);
      if(!res.ok) throw new Error("GitHub API "+res.status);
      const items=await res.json();
      const re=/^(\d{1,2})_(.+)\.(jpe?g|png)$/i;
      items.filter(it=>it.type==="file").forEach(it=>{
        const m=it.name.match(re);
        if(!m) return;
        const month=parseInt(m[1],10);
        if(month<1||month>12) return;
        const photo={file:it.name,month,title:m[2],url:this.rawUrl(it.name)};
        (this.byMonth[month]=this.byMonth[month]||[]).push(photo);
      });
      // 月順 → 各月ファイル名順 でフラット化
      for(let mo=1;mo<=12;mo++){
        (this.byMonth[mo]||[]).sort((a,b)=>a.file.localeCompare(b.file,"ja"));
        (this.byMonth[mo]||[]).forEach(p=>this.all.push(p));
      }
      this.render();
    }catch(err){
      document.getElementById("status").innerHTML=
        "写真を読み込めませんでした。<br><small style='color:#6f80a6'>"+
        "リポジトリ "+CONFIG.user+"/"+CONFIG.repo+" を公開設定にし、"+
        "「月_タイトル.jpg」形式の写真を置いてください。</small>";
      console.error(err);
    }
  },

  render(){
    // タブ
    const tabs=document.getElementById("tabs");
    tabs.innerHTML="";
    MONTHS.forEach(mo=>{
      const has=(this.byMonth[mo.n]||[]).length>0;
      const b=document.createElement("button");
      b.className="tab"+(mo.n===this.current?" active":"");
      b.innerHTML=mo.wa+"<span class='num'>"+mo.en+(has?" · "+this.byMonth[mo.n].length:"")+"</span>";
      b.style.opacity=has?1:.4;
      b.onclick=()=>this.show(mo.n);
      tabs.appendChild(b);
    });
    // 最初に写真がある月を表示
    if(!(this.byMonth[this.current]||[]).length){
      const first=MONTHS.find(m=>(this.byMonth[m.n]||[]).length);
      if(first) this.current=first.n;
    }
    document.getElementById("status").style.display="none";
    this.show(this.current);
  },

  show(month){
    this.current=month;
    document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",MONTHS[i].n===month));
    const mo=MONTHS.find(m=>m.n===month);
    document.getElementById("monthTitle").innerHTML=
      mo.wa+"<span class='sub'>"+mo.en+"</span>";
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    const list=this.byMonth[month]||[];
    if(!list.length){
      grid.innerHTML="<div id='status' style='display:block;grid-column:1/-1'>この月の写真はまだありません。</div>";
      return;
    }
    list.forEach((p,idx)=>{
      const c=document.createElement("div");c.className="card";
      c.innerHTML=`<img src="${p.url}" alt="${p.title}" loading="lazy">
        <div class="cap"><small>${mo.wa} · ${mo.en}</small>${p.title}</div>`;
      c.onclick=()=>Lightbox.open(month,idx);
      grid.appendChild(c);
    });
  }
};

/* ════════════════════════════════════════════
   ライトボックス（拡大・左右めくり）
════════════════════════════════════════════ */
const Lightbox = {
  list:[], i:0,
  open(month,idx){
    this.list=Gallery.byMonth[month]||[];
    this.i=idx;
    document.getElementById("lightbox").classList.add("open");
    this.draw();
  },
  draw(){
    const p=this.list[this.i];if(!p)return;
    const mo=MONTHS.find(m=>m.n===p.month);
    document.getElementById("lbImg").src=p.url;
    document.getElementById("lbImg").alt=p.title;
    document.getElementById("lbTitle").textContent=p.title;
    document.getElementById("lbMonth").textContent=mo.wa+" · "+mo.en;
  },
  move(d){
    this.i=(this.i+d+this.list.length)%this.list.length;
    this.draw();
  },
  close(){document.getElementById("lightbox").classList.remove("open")}
};

/* ════════════════════════════════════════════
   流れ星
════════════════════════════════════════════ */
function shootStar(){
  const s=document.createElement("div");s.className="shooting";
  const startX=window.innerWidth*(0.3+Math.random()*0.6);
  const startY=window.innerHeight*(0.1+Math.random()*0.3);
  s.style.left=startX+"px";s.style.top=startY+"px";
  document.body.appendChild(s);
  const dx=-(200+Math.random()*220), dy=160+Math.random()*160;
  s.animate([
    {transform:"translate(0,0) rotate(25deg)",opacity:1},
    {transform:`translate(${dx}px,${dy}px) rotate(25deg)`,opacity:0}
  ],{duration:900+Math.random()*300,easing:"cubic-bezier(.4,0,.6,1)"})
   .onfinish=()=>s.remove();
}

/* ════════════════════════════════════════════
   スライドショー（7秒・フェード・暦順・ループ＋BGM）
════════════════════════════════════════════ */
const Slideshow = {
  seq:[], idx:0, timer:null, active:"A", bgmIdx:0,
  start(mode){
    if(mode==="month")      this.seq=(Gallery.byMonth[Gallery.current]||[]).slice();
    else if(mode==="from-lightbox"){ this.seq=Lightbox.list.slice(); Lightbox.close(); }
    else                    this.seq=Gallery.all.slice();
    if(!this.seq.length){alert("写真がまだありません。");return;}
    this.idx=0;
    const h=document.querySelector(".ss-hint");
    h.style.color="";h.textContent="♪ BGM 再生中 ― 画面のどこでも操作できます";
    document.getElementById("slideshow").classList.add("open");
    this.playBgm();
    this.show(true);
    this.timer=setInterval(()=>this.show(false),CONFIG.slideSec*1000);
    document.documentElement.requestFullscreen?.().catch(()=>{});
  },
  show(first){
    const p=this.seq[this.idx];
    const a=document.getElementById("ssA"), b=document.getElementById("ssB");
    const cap=document.getElementById("ssCap");
    const cur=this.active==="A"?a:b, nxt=this.active==="A"?b:a;
    nxt.src=p.url;
    nxt.onload=()=>{
      nxt.classList.add("show"); cur.classList.remove("show");
      this.active=this.active==="A"?"B":"A";
    };
    if(first){cur.src=p.url;cur.classList.add("show");}
    const mo=MONTHS.find(m=>m.n===p.month);
    cap.classList.remove("show");
    setTimeout(()=>{
      document.getElementById("ssCapM").textContent=mo.wa+" · "+mo.en;
      document.getElementById("ssCapT").textContent=p.title;
      cap.classList.add("show");
    },first?200:700);
    this.idx=(this.idx+1)%this.seq.length;   // 延々ループ
  },
  playBgm(){
    const bgm=document.getElementById("bgm");
    this.bgmIdx=0;
    const next=()=>{
      const file=CONFIG.bgm[this.bgmIdx % CONFIG.bgm.length];
      bgm.src=Gallery.rawUrl(file);
      this.bgmIdx++;
      bgm.play().catch(err=>this.bgmHint(file,err));
    };
    bgm.onended=next;
    bgm.onerror=()=>this.bgmHint(CONFIG.bgm[(this.bgmIdx-1+CONFIG.bgm.length)%CONFIG.bgm.length],bgm.error);
    next();
  },
  bgmHint(file,err){
    const h=document.querySelector(".ss-hint");
    h.style.color="#e8d6a0";
    h.textContent="♪ "+file+" を再生できませんでした。ファイル名・配置・形式をご確認ください。";
    console.warn("BGM error:",file,err);
  },
  stop(){
    clearInterval(this.timer);this.timer=null;
    document.getElementById("slideshow").classList.remove("open");
    document.getElementById("ssA").classList.remove("show");
    document.getElementById("ssB").classList.remove("show");
    const bgm=document.getElementById("bgm");bgm.pause();bgm.onended=null;bgm.onerror=null;
    if(document.fullscreenElement) document.exitFullscreen?.();
  }
};

/* ════════════════════════════════════════════
   キーボード操作
════════════════════════════════════════════ */
document.addEventListener("keydown",e=>{
  if(document.getElementById("lightbox").classList.contains("open")){
    if(e.key==="ArrowLeft")Lightbox.move(-1);
    if(e.key==="ArrowRight")Lightbox.move(1);
    if(e.key==="Escape")Lightbox.close();
  }
  if(document.getElementById("slideshow").classList.contains("open")&&e.key==="Escape")Slideshow.stop();
});

Gallery.load();
</script>
